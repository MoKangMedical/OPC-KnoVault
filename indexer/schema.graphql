type Opc @entity {
  id: ID!
  wallet: String!
  verificationHash: String!
  uri: String!
  verifiedAtBlock: BigInt!
  transactionHash: String!
}

type KnowledgeAsset @entity {
  id: ID!
  assetId: BigInt!
  seller: String!
  assetType: Int!
  productionMode: Int!
  assetHash: String!
  priceWei: BigInt!
  subscriptionDuration: BigInt!
  version: Int!
  versionHash: String
  versionUri: String
  subscriberCount: Int!
  feedbackCount: Int!
  scoreTotal: Int!
  createdAtBlock: BigInt!
  transactionHash: String!
}

type Subscription @entity {
  id: ID!
  subscriptionId: BigInt!
  assetId: BigInt!
  buyer: String!
  seller: String!
  valueWei: BigInt!
  accessEndsAt: BigInt!
  accessHash: String!
  accessUri: String!
  status: String!
  feedbackRating: Int
  feedbackHash: String
  feedbackUri: String
  transactionHash: String!
}

type TrustEvent @entity {
  id: ID!
  type: String!
  assetId: BigInt
  subscriptionId: BigInt
  actor: String
  transactionHash: String!
  blockNumber: BigInt!
}
